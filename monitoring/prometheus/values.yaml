# kube-prometheus-stack values for cloud-native-lab
# Tuned for kind cluster — includes Tempo datasource for traces

fullnameOverride: kube-prometheus-stack

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1

grafana:
  enabled: true
  replicas: 1
  adminPassword: "CHANGE_ME"  # set a strong password before deploying
  service:
    type: NodePort
    nodePort: 30300
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local:80
      access: proxy
      isDefault: false
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
        serviceMap:
          datasourceUid: prometheus
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      argocd:
        gnetId: 14584
        revision: 1
        datasource: Prometheus
      cilium-agent:
        gnetId: 16611
        revision: 1
        datasource: Prometheus
      cilium-hubble:
        gnetId: 16612
        revision: 1
        datasource: Prometheus
  sidecar:
    dashboards:
      enabled: true
  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    additionalScrapeConfigs:
      - job_name: otel-collector
        static_configs:
          - targets: ['otel-collector-collector.opentelemetry.svc.cluster.local:8889']
  service:
    type: NodePort
    nodePort: 30900

prometheusOperator:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
