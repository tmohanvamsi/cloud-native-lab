name: MLOps — Build and Deploy Model

on:
  workflow_run:
    workflows: ["MLOps — Train and Evaluate"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/iris-model

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Train model if artifact missing
        run: |
          if [ ! -f models/model.pkl ]; then
            pip install -r mlops/requirements.txt
            python mlops/prepare.py
            python mlops/train.py
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mlops/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image tag in manifest
        run: |
          IMAGE_TAG=$(echo "${{ needs.build-and-push.outputs.image_tag }}" | head -1)
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_TAG}|g" manifests/mlops/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f manifests/mlops/
          kubectl rollout status deployment/iris-model -n apps --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n apps -l app=iris-model
          kubectl get svc -n apps iris-model
